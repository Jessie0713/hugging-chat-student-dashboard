services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    extra_hosts:
      - 'host.docker.internal:host-gateway'
  frontend:
    build: ./frontend
    ports:
      - '8080:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: always
